<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galerie – [Salonname]</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
  <a href="index.html" class="nav-logo">[Salonname]</a>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">Home</a></li>
    <li><a href="leistungen.html">Leistungen & Preise</a></li>
    <li><a href="team.html">Team</a></li>
    <li><a href="galerie.html" class="active">Galerie</a></li>
    <li><a href="kontakt.html">Kontakt</a></li>
    <li><a href="termin.html" class="nav-cta">Termin buchen</a></li>
  </ul>
  <button class="hamburger" onclick="document.getElementById('navLinks').classList.toggle('open')">
    ☰
  </button>
</nav>

<div class="page-content">

  <div class="page-hero">
    <p class="section-label">Unsere Arbeit</p>
    <h1 class="section-title">Die <em>Galerie</em></h1>
    <p class="hero-text">
      Inspiration und Einblicke aus unserem Salon – von klassischen Schnitten bis zu modernen Colorationen.
    </p>
  </div>

  <!-- FILTER -->
  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">Alle</button>
    <button class="filter-btn" data-filter="schnitt">Schnitt</button>
    <button class="filter-btn" data-filter="farbe">Farbe</button>
    <button class="filter-btn" data-filter="braut">Braut</button>
    <button class="filter-btn" data-filter="salon">Salon</button>
  </div>

  <!-- GALLERY -->
  <div class="gallery-masonry">

    <div class="gallery-item" data-category="farbe" onclick="openLightbox(this)">
      <img src="images/balayage.png" alt="Balayage" loading="lazy">
      <div class="gallery-item-overlay">🔍</div>
      <span class="gallery-tag">Balayage</span>
    </div>

    <div class="gallery-item" data-category="schnitt" onclick="openLightbox(this)">
      <img src="images/damenschnitt.png" alt="Damenschnitt" loading="lazy">
      <div class="gallery-item-overlay">🔍</div>
      <span class="gallery-tag">Damenschnitt</span>
    </div>

    <div class="gallery-item" data-category="braut" onclick="openLightbox(this)">
      <img src="images/braut.png" alt="Brautfrisur" loading="lazy">
      <div class="gallery-item-overlay">🔍</div>
      <span class="gallery-tag">Braut</span>
    </div>

    <div class="gallery-item" data-category="farbe" onclick="openLightbox(this)">
      <img src="images/highlights.png" alt="Highlights" loading="lazy">
      <div class="gallery-item-overlay">🔍</div>
      <span class="gallery-tag">Highlights</span>
    </div>

    <div class="gallery-item" data-category="salon" onclick="openLightbox(this)">
      <img src="images/salon.png" alt="Salon" loading="lazy">
      <div class="gallery-item-overlay">🔍</div>
      <span class="gallery-tag">Salon</span>
    </div>

    <div class="gallery-item" data-category="schnitt" onclick="openLightbox(this)">
      <img src="images/herrenschnitt.png" alt="Herrenschnitt" loading="lazy">
      <div class="gallery-item-overlay">🔍</div>
      <span class="gallery-tag">Herren</span>
    </div>

  </div>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">&times;</span>
  <img class="lightbox-img" id="lightbox-img">
</div>

<script>
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const filter = btn.dataset.filter;

    document.querySelectorAll('.gallery-item').forEach(item => {
      item.style.display =
        (filter === 'all' || item.dataset.category === filter)
        ? 'block' : 'none';
    });
  };
});

function openLightbox(el) {
  const img = el.querySelector('img');
  document.getElementById('lightbox-img').src = img.src;
  document.getElementById('lightbox').style.display = 'flex';
}

function closeLightbox() {
  document.getElementById('lightbox').style.display = 'none';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox();
});
</script>

</body>
</html>
