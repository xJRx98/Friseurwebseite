<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galerie – [Salonname]</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── FILTER BAR ── */
    .filter-bar {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
      padding: 0 5vw 3rem;
    }

    .filter-btn {
      background: transparent;
      border: 1px solid rgba(201,169,110,0.3);
      color: var(--text-muted);
      padding: 0.5rem 1.4rem;
      font-family: 'Jost', sans-serif;
      font-size: 0.78rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.3s, color 0.3s, border-color 0.3s;
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: rgba(201,169,110,0.1);
      border-color: var(--gold);
      color: var(--gold);
    }

    /* ── GALLERY MASONRY ── */
    .gallery-masonry {
      padding: 0 5vw 7rem;
      columns: 3;
      column-gap: 4px;
    }

    .gallery-item {
      position: relative;
      overflow: hidden;
      min-height: 280px;
      break-inside: avoid;
      margin-bottom: 4px;
      cursor: pointer;
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s;
    }

    .gallery-item:hover img {
      transform: scale(1.04);
    }

    .gallery-item-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s;
      font-size: 1.5rem;
    }

    .gallery-item:hover .gallery-item-overlay {
      opacity: 1;
    }

    .gallery-tag {
      position: absolute;
      bottom: 1rem;
      left: 1rem;
      background: rgba(26,24,21,0.75);
      color: var(--gold);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.3rem 0.8rem;
      backdrop-filter: blur(4px);
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 9000;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .lightbox-img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
    }

    .lightbox-close {
      position: absolute;
      top: 1.5rem;
      right: 2rem;
      color: var(--text-muted);
      font-size: 2rem;
      cursor: pointer;
      line-height: 1;
      transition: color 0.3s;
    }

    .lightbox-close:hover { color: var(--gold); }

    /* ── PAGE HERO TEXT ── */
    .hero-text {
      color: var(--text-muted);
      max-width: 500px;
      margin: 0 auto;
      font-size: 1rem;
    }

    @media (max-width: 900px) {
      .gallery-masonry { columns: 2; }
    }

    @media (max-width: 640px) {
      .gallery-masonry { columns: 1; }
    }
  </style>
</head>

<body>

<nav>
  <a href="index.html" class="nav-logo">[Salonname]</a>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">Home</a></li>
    <li><a href="leistungen.html">Leistungen & Preise</a></li>
    <li><a href="team.html">Team</a></li>
    <li><a href="galerie.html" class="active">Galerie</a></li>
    <li><a href="kontakt.html">Kontakt</a></li>
    <li><a href="termin.html" class="nav-cta">Termin buchen</a></li>
  </ul>
  <button class="hamburger" onclick="document.getElementById('navLinks').classList.toggle('open')" aria-label="Menü">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="page-content">

  <div class="page-hero">
    <p class="section-label">Unsere Arbeit</p>
    <h1 class="section-title">Die <em>Galerie</em></h1>
    <p class="hero-text">
      Inspiration und Einblicke aus unserem Salon – von klassischen Schnitten bis zu modernen Colorationen.
    </p>
  </div>

  <!-- FILTER -->
  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">Alle</button>
    <button class="filter-btn" data-filter="schnitt">Schnitt</button>
    <button class="filter-btn" data-filter="farbe">Farbe</button>
    <button class="filter-btn" data-filter="braut">Braut</button>
    <button class="filter-btn" data-filter="salon">Salon</button>
  </div>

  <!-- GALLERY -->
  <div class="gallery-masonry">

    <div class="gallery-item" data-category="farbe" onclick="openLightbox(this)">
      <img src="images/balayage.png" alt="Balayage" loading="lazy">
      <div class="gallery-item-overlay">🔍</div>
      <span class="gallery-tag">Balayage</span>
    </div>

    <div class="gallery-item" data-category="schnitt" onclick="openLightbox(this)">
      <img src="images/damenschnitt.png" alt="Damenschnitt" loading="lazy">
      <div class="gallery-item-overlay">🔍</div>
      <span class="gallery-tag">Damenschnitt</span>
    </div>

    <div class="gallery-item" data-category="braut" onclick="openLightbox(this)">
      <img src="images/brautfrisur.png" alt="Brautfrisur" loading="lazy">
      <div class="gallery-item-overlay">🔍</div>
      <span class="gallery-tag">Braut</span>
    </div>

    <div class="gallery-item" data-category="farbe" onclick="openLightbox(this)">
      <img src="images/highlights.png" alt="Highlights" loading="lazy">
      <div class="gallery-item-overlay">🔍</div>
      <span class="gallery-tag">Highlights</span>
    </div>

    <div class="gallery-item" data-category="salon" onclick="openLightbox(this)">
      <img src="images/salon.png" alt="Salon" loading="lazy">
      <div class="gallery-item-overlay">🔍</div>
      <span class="gallery-tag">Salon</span>
    </div>

    <div class="gallery-item" data-category="schnitt" onclick="openLightbox(this)">
      <img src="images/herrenschnitt.png" alt="Herrenschnitt" loading="lazy">
      <div class="gallery-item-overlay">🔍</div>
      <span class="gallery-tag">Herren</span>
    </div>

  </div>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">&times;</span>
  <img class="lightbox-img" id="lightbox-img" alt="">
</div>

<script>
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const filter = btn.dataset.filter;

    document.querySelectorAll('.gallery-item').forEach(item => {
      item.style.display =
        (filter === 'all' || item.dataset.category === filter)
        ? 'block' : 'none';
    });
  };
});

function openLightbox(el) {
  const img = el.querySelector('img');
  document.getElementById('lightbox-img').src = img.src;
  document.getElementById('lightbox-img').alt = img.alt;
  document.getElementById('lightbox').style.display = 'flex';
}

function closeLightbox() {
  document.getElementById('lightbox').style.display = 'none';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox();
});
</script>

</body>
</html>
